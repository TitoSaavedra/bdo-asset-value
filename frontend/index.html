<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDO Asset Value</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
    <div class="app">
        <aside class="card sidebar">
            <div class="brand">
                <span class="brand-spirit" aria-hidden="true">
                    <img class="brand-spirit-fill" src="/static/blackspirit.svg" alt="">
                    <img class="brand-spirit-outline" src="/static/blackspirit-outline.svg" alt="">
                </span>
                <div>
                    <h1 class="logo">BDO Asset Value</h1>
                </div>
            </div>
            <div class="menu">
                <button class="active" data-screen="dashboard">Dashboard</button>
                <button data-screen="manual" hidden>Registro manual</button>
                <button data-screen="warehouses">Activos por almacén</button>
                <button data-screen="metrics">Métricas</button>
            </div>
            <div class="theme-picker">
                <label for="themeSelect">Tema</label>
                <select id="themeSelect" aria-label="Seleccionar tema">
                    <option value="desert">Desierto</option>
                    <option value="midnight">Nocturno</option>
                    <option value="light">Claro</option>
                </select>
            </div>

            <div class="connection-card" aria-live="polite">
                <div class="connection-card-title">Conexión</div>
                <div class="connection-grid">
                    <span class="connection-label">API</span>
                    <span class="connection-pill connection-offline" id="apiConnectionBadge">Desconectada</span>
                    <span class="connection-label">WebSocket</span>
                    <span class="connection-pill connection-offline" id="wsConnectionBadge">Desconectado</span>
                </div>
                <div class="connection-updated" id="connectionUpdatedAt">Sin actividad reciente</div>
            </div>
        </aside>

        <main class="content">
            <section class="screen active" id="screen-dashboard" data-view="/static/views/dashboard.html"></section>
            <section class="screen" id="screen-manual" data-view="/static/views/manual.html" hidden></section>
            <section class="screen" id="screen-warehouses" data-view="/static/views/warehouses.html"></section>
            <section class="screen" id="screen-metrics" data-view="/static/views/metrics.html"></section>
        </main>
    </div>

    <div class="startup-overlay" id="startupOverlay" hidden>
        <div class="card startup-card" role="status" aria-live="polite" aria-atomic="true">
            <h2>Esperando inicio de aplicación</h2>
            <p id="startupMessage">Conectando con la API...</p>
            <div class="startup-progress" aria-hidden="true">
                <div class="startup-progress-bar" id="startupProgressBar"></div>
            </div>
        </div>
    </div>

    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/static/js/main.js"></script>
</body>

</html>
