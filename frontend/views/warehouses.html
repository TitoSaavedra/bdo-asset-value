<div class="card header">
    <h1>Activos por almacén</h1>
    <p>Estado y snapshots por almacén.</p>
</div>

<section class="card panel">
    <div class="panel-head">
        <h2>Listado actual por almacén</h2>
    </div>
    <p id="warehouseMissingInfo" class="sub"></p>
    <div class="table-wrap table-scroll-y">
        <table>
            <thead>
                <tr>
                    <th>Almacén</th>
                    <th>Valor actual</th>
                    <th>Última actualización</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="warehouseListBody" data-columns="4" data-empty-message="Sin estado de almacenes."></tbody>
        </table>
    </div>
</section>

<section class="card panel">
    <div class="panel-head">
        <h2>Snapshots OCR</h2>
    </div>
    <div class="table-wrap table-scroll-y">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Almacén</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody id="snapshotsBody" data-columns="3" data-empty-message="Sin snapshots OCR aún."></tbody>
        </table>
    </div>
    <div class="table-pagination" id="snapshotsPagination" hidden>
        <button class="pagination-btn" id="snapshotsPrevBtn" type="button">Anterior</button>
        <span class="pagination-info" id="snapshotsPageInfo">Página 1 / 1</span>
        <button class="pagination-btn" id="snapshotsNextBtn" type="button">Siguiente</button>
    </div>
</section>
