<div class="card header">
    <h1>Registro manual</h1>
    <p>Carga valores manuales.</p>
</div>

<section class="card panel">
    <div class="field-grid">
        <div class="field">
            <label for="marketInput">Silver mercado</label>
            <input id="marketInput" type="number" min="0" placeholder="8508622614">
        </div>
        <div class="field">
            <label for="inventoryInput">Silver inventario</label>
            <input id="inventoryInput" type="number" min="0" placeholder="500000">
        </div>
        <div class="field">
            <label for="preorderInput">Silver preorder</label>
            <input id="preorderInput" type="number" min="0" placeholder="0">
        </div>
    </div>
    <div class="actions">
        <button class="btn btn-primary" id="saveManualBtn">Guardar manual</button>
        <button class="btn btn-secondary" id="refreshBtn">Actualizar dashboard</button>
        <button class="btn btn-muted" id="downloadBtn">Descargar JSON</button>
    </div>
    <div class="status" id="status"></div>
</section>
