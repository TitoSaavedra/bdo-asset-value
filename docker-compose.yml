services:
  api:
    build:
      context: .
      dockerfile: python-api-service/Dockerfile
    container_name: bdo-api
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "${API_PORT:-8000}"
      MONGODB_URL: "mongodb://mongodb:27017"
      DATABASE_NAME: "${DATABASE_NAME:-bdo_asset_tracker}"
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend-tauri/Dockerfile
    container_name: bdo-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      BACKEND_URL: "http://api:${API_PORT:-8000}"
      BACKEND_WS_URL: "http://api:${API_PORT:-8000}"
    depends_on:
      - api
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: bdo-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: "${DATABASE_NAME:-bdo_asset_tracker}"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: